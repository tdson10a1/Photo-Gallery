<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <a id="top"></a>

    <h1>My Cat Photo Gallery</h1>

    <p>
        This gallery shows a collection of cute and funny cats.
        The layout changes depending on screen size.
    </p>

    <p>
        This website supports responsive design, dark mode,
        and reduced motion preferences for accessibility.
    </p>

    <main class="grid">

        <figure>
            <img src="images/im1.webp" alt="Sleepy orange cat lying on the floor">
            <figcaption>Sleepy Cat</figcaption>
        </figure>

        <figure>
            <img src="images/im2.webp" alt="Playful kitten jumping">
            <figcaption>Playful Cat</figcaption>
        </figure>

        <figure>
            <img src="images/im3.webp" alt="Angry cat with serious face">
            <figcaption>Angry Cat</figcaption>
        </figure>

        <figure>
            <img src="images/im4.webp" alt="Happy cat smiling">
            <figcaption>Happy Cat</figcaption>
        </figure>

        <figure>
            <img src="images/im5.webp" alt="Hungry cat looking at food">
            <figcaption>Hungry Cat</figcaption>
        </figure>

        <figure>
            <img src="images/im6.webp" alt="Curious cat looking outside window">
            <figcaption>Curious Cat</figcaption>
        </figure>

        <figure>
            <img src="images/im7.webp" alt="Lazy cat sleeping on sofa">
            <figcaption>Lazy Cat</figcaption>
        </figure>

        <figure>
            <img src="images/im8.webp" alt="Cat jumping in the air">
            <figcaption>Jumping Cat</figcaption>
        </figure>

        <figure>
            <img src="images/im9.webp" alt="Shy kitten hiding behind curtain">
            <figcaption>Shy Cat</figcaption>
        </figure>

        <figure>
            <img src="images/im10.gif" alt="Funny animated cat gif">
            <figcaption>Funny Cat GIF</figcaption>
        </figure>

    </main>

    <p style="text-align:center; margin-top:20px;">
        <a href="#top">Jump to the Top</a>
    </p>

</body>
</html>
